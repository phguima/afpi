---
# Tasks for 'desktop' role

# --- Fonts Installation ---
- name: Software | Install Selected Fonts
  ansible.builtin.dnf:
    name: "{{ fonts_packages }}"
    state: present
  tags: [software, fonts]

# --- Visual Personalization ---
- name: Desktop | Personalization (Wallpaper & Profile)
  ansible.builtin.import_tasks: personalization.yml
  tags: [personalization, desktop, visual]

# --- KDE Store Extensions (KNS) ---
- name: Desktop | KDE Store Components (Widgets/Icons)
  ansible.builtin.import_tasks: kde_extensions.yml
  tags: [kde, extensions]

# --- Plasma Desktop Layout ---
- name: Desktop | Plasma Desktop Layout & Widgets
  ansible.builtin.import_tasks: plasma_layout.yml
  tags: [kde, layout]

# --- KDE Specific Configuration ---
- name: KDE | Ensure konsole directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/share/konsole"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0755'
  when: is_kde and user_name != 'root'
  tags: [software, kde, konsole]

- name: KDE | Copy konsole profile
  ansible.builtin.copy:
    src: "kali-like-alt.profile"
    dest: "{{ user_home }}/.local/share/konsole/kali-like-alt.profile"
    owner: "{{ user_name }}"
    mode: '0644'
  when: is_kde and user_name != 'root'
  tags: [software, kde, konsole]

- name: KDE | Copy konsole color scheme
  ansible.builtin.copy:
    src: "kali-like-alt.colorscheme"
    dest: "{{ user_home }}/.local/share/konsole/kali-like-alt.colorscheme"
    owner: "{{ user_name }}"
    mode: '0644'
  when: is_kde and user_name != 'root'
  tags: [software, kde, konsole]

- name: KDE | Disable konsole 'Remember window size'
  community.general.ini_file:
    path: "{{ user_home }}/.config/konsolerc"
    section: "KonsoleWindow"
    option: RememberWindowSize
    value: "false"
    owner: "{{ user_name }}"
    mode: '0644'
  when: is_kde and user_name != 'root'
  tags: [software, kde, konsole]

- name: KDE | Set default konsole profile
  community.general.ini_file:
    path: "{{ user_home }}/.config/konsolerc"
    section: "Desktop Entry"
    option: DefaultProfile
    value: "kali-like-alt.profile"
    owner: "{{ user_name }}"
    mode: '0644'
  when: is_kde and user_name != 'root'
  tags: [software, kde, konsole]

- name: KDE | Expand individual tab widths to full window
  community.general.ini_file:
    path: "{{ user_home }}/.config/konsolerc"
    section: "TabBar"
    option: ExpandTabWidth
    value: "true"
    owner: "{{ user_name }}"
    mode: '0644'
  when: is_kde and user_name != 'root'
  tags: [software, kde, konsole]

# --- GNOME Specific Configuration (PTYxis) ---
- name: GNOME | Set PTYxis terminal window size and behavior
  ansible.builtin.command: "gsettings set org.gnome.Ptyxis {{ item.key }} {{ item.value }}"
  become_user: "{{ user_name }}"
  loop:
    - { key: "restore-window-size", value: "{{ ptyxis_restore_window_size }}" }
    - { key: "default-columns", value: "{{ ptyxis_default_columns }}" }
    - { key: "default-rows", value: "{{ ptyxis_default_rows }}" }
  when: is_gnome and user_name != 'root'
  tags: [software, gnome, ptyxis]

- name: GNOME | Set PTYxis cursor and font settings
  ansible.builtin.command: "dconf write /org/gnome/Ptyxis/{{ item.key }} \"{{ item.value }}\""
  become_user: "{{ user_name }}"
  loop:
    - { key: "cursor-shape", value: "'{{ ptyxis_cursor_shape }}'" }
    - { key: "cursor-blink-mode", value: "'{{ ptyxis_cursor_blink_mode }}'" }
    - { key: "use-system-font", value: "{{ ptyxis_use_system_font }}" }
    - { key: "font-name", value: "'{{ ptyxis_font_name }}'" }
  when: is_gnome and user_name != 'root'
  tags: [software, gnome, ptyxis]

- name: GNOME | Get PTYxis default profile UUID
  ansible.builtin.shell: dconf read /org/gnome/Ptyxis/default-profile-uuid | tr -d "'"
  register: ptyxis_default_uuid
  become_user: "{{ user_name }}"
  changed_when: false
  when: is_gnome and user_name != 'root'
  tags: [software, gnome, ptyxis]

- name: GNOME | Set PTYxis transparency
  ansible.builtin.command: "dconf write /org/gnome/Ptyxis/Profiles/{{ ptyxis_default_uuid.stdout }}/opacity {{ ptyxis_opacity }}"
  become_user: "{{ user_name }}"
  when: 
    - is_gnome 
    - user_name != 'root'
    - ptyxis_default_uuid.stdout != ""
  tags: [software, gnome, ptyxis]

# --- Cedilla Configuration ---
- name: Cedilla | Find system compose file
  ansible.builtin.shell: |
    LANG_VAL=${LANG:=en_US.UTF-8}
    COMPOSE_DIR="/usr/share/X11/locale"
    sed -ne "s/^\([^:]*\):[ \t]*$LANG_VAL/\1/p" <"${COMPOSE_DIR}/compose.dir" | head -1
  register: system_compose_name
  changed_when: false
  tags: [system, cedilla]

- name: Cedilla | Ensure .XCompose exists (copy from system)
  ansible.builtin.copy:
    src: "/usr/share/X11/locale/{{ system_compose_name.stdout }}"
    dest: "{{ user_home }}/.XCompose"
    remote_src: yes
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0644'
    force: no
  when: 
    - system_compose_name.stdout != ""
    - user_name != 'root'
  tags: [system, cedilla]

- name: Cedilla | Apply character mapping for cedilla (ç)
  ansible.builtin.replace:
    path: "{{ user_home }}/.XCompose"
    regexp: "{{ item.regex }}"
    replace: "{{ item.replace }}"
  loop:
    - { regex: 'ć', replace: 'ç' }
    - { regex: 'Ć', replace: 'Ç' }
  when: user_name != 'root'
  tags: [system, cedilla]

- name: Cedilla | Apply Flatpak overrides for Bitwarden (KDE)
  ansible.builtin.command:
    cmd: "flatpak override --user --nosocket=wayland --env=GTK_IM_MODULE=cedilla --env=XDG_CURRENT_DESKTOP=KDE --env=GTK_USE_PORTAL=1 com.bitwarden.desktop"
  become_user: "{{ user_name }}"
  register: bitwarden_override_kde
  failed_when: false
  changed_when: false
  when: is_kde and user_name != 'root'
  tags: [system, cedilla, flatpak]

- name: Cedilla | Apply Flatpak overrides for Zoom (KDE)
  ansible.builtin.command:
    cmd: "flatpak override --user --nosocket=wayland --env=GTK_IM_MODULE=cedilla --env=QT_IM_MODULE=cedilla --env=XDG_CURRENT_DESKTOP=KDE --env=GTK_USE_PORTAL=1 --filesystem=home us.zoom.Zoom"
  become_user: "{{ user_name }}"
  register: zoom_override
  failed_when: false
  changed_when: false
  when: is_kde and user_name != 'root'
  tags: [system, zoom, cedilla, flatpak]

# --- Browser Cedilla (X11 Ozone) ---
- name: Cedilla | Ensure local applications directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.local/share/applications"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0755'
  when: user_name != 'root'
  tags: [brave, chromium, cedilla]

- name: Cedilla | Copy Brave desktop file to local share
  ansible.builtin.copy:
    src: /usr/share/applications/brave-browser.desktop
    dest: "{{ user_home }}/.local/share/applications/brave-browser.desktop"
    remote_src: yes
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0644'
    force: no
  when: user_name != 'root'
  tags: [brave, cedilla]

- name: Cedilla | Configure Brave to use X11 ozone platform
  ansible.builtin.replace:
    path: "{{ user_home }}/.local/share/applications/brave-browser.desktop"
    regexp: '^Exec=((?!.*--ozone-platform=x11).*?)(\s+(%[uU]|--incognito|--new-window))?$'
    replace: 'Exec=\1 --ozone-platform=x11\2'
  when: user_name != 'root'
  tags: [brave, cedilla]

- name: Cedilla | Copy Chromium desktop file to local share
  ansible.builtin.copy:
    src: /usr/share/applications/chromium-browser.desktop
    dest: "{{ user_home }}/.local/share/applications/chromium-browser.desktop"
    remote_src: yes
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0644'
    force: no
  when: user_name != 'root'
  tags: [chromium, cedilla]

- name: Cedilla | Configure Chromium to use X11 ozone platform
  ansible.builtin.replace:
    path: "{{ user_home }}/.local/share/applications/chromium-browser.desktop"
    regexp: '^Exec=((?!.*--ozone-platform=x11).*?)(\s+(%[uU]|--incognito|--new-window))?$'
    replace: 'Exec=\1 --ozone-platform=x11\2'
  when: user_name != 'root'
  tags: [chromium, cedilla]

- name: Cedilla | Update desktop database
  ansible.builtin.command:
    cmd: "update-desktop-database {{ user_home }}/.local/share/applications/"
  become_user: "{{ user_name }}"
  changed_when: false
  when: user_name != 'root'
  tags: [brave, chromium, cedilla]

- name: Cedilla | Display completion message
  ansible.builtin.debug:
    msg:
      - "Cedilla fix applied to {{ user_home }}/.XCompose."
      - "Please log out of your session and re-login to effect changes."
  tags: [system, cedilla]
