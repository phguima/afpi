---
# KDE Store Extensions (KNS) Installation - Manual Extraction Method (Robust)

# --- Directory Setup ---
- name: KDE Extensions | Ensure local directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0755'
  loop:
    - "{{ user_home }}/.local/share/plasma/plasmoids"
    - "{{ user_home }}/.local/share/kwin/scripts"
    - "/tmp/afpi_downloads"
  when: user_name != 'root'
  tags: [kde, extensions, setup]

# --- Modern Clock ---
- name: KDE Extensions | Install Modern Clock
  ansible.builtin.shell: |
    curl -L -A "Mozilla/5.0" -o /tmp/modern_clock.tar.gz https://store.kde.org/dl/2344806
    mkdir -p {{ user_home }}/.local/share/plasma/plasmoids/com.github.vKaras1337.modernclock
    tar -xzf /tmp/modern_clock.tar.gz -C {{ user_home }}/.local/share/plasma/plasmoids/com.github.vKaras1337.modernclock --strip-components=1
    chown -R {{ user_name }}:{{ user_name }} {{ user_home }}/.local/share/plasma/plasmoids/com.github.vKaras1337.modernclock
  become: yes
  tags: [kde, extensions, widgets]

# --- Panel Colorizer ---
- name: KDE Extensions | Install Panel Colorizer
  ansible.builtin.shell: |
    curl -L -A "Mozilla/5.0" -o /tmp/panel_colorizer.tar.gz https://store.kde.org/dl/2130967
    mkdir -p {{ user_home }}/.local/share/plasma/plasmoids/luisbocanegra.panel.colorizer
    tar -xzf /tmp/panel_colorizer.tar.gz -C {{ user_home }}/.local/share/plasma/plasmoids/luisbocanegra.panel.colorizer --strip-components=1
    chown -R {{ user_name }}:{{ user_name }} {{ user_home }}/.local/share/plasma/plasmoids/luisbocanegra.panel.colorizer
  become: yes
  tags: [kde, extensions, widgets]

# --- KZones ---
- name: KDE Extensions | Install KZones
  ansible.builtin.shell: |
    curl -L -A "Mozilla/5.0" -o /tmp/kzones.zip https://store.kde.org/dl/1909220
    mkdir -p {{ user_home }}/.local/share/kwin/scripts/kzones
    unzip -o /tmp/kzones.zip -d /tmp/kzones_tmp
    cp -r /tmp/kzones_tmp/*/* {{ user_home }}/.local/share/kwin/scripts/kzones/ || cp -r /tmp/kzones_tmp/* {{ user_home }}/.local/share/kwin/scripts/kzones/
    chown -R {{ user_name }}:{{ user_name }} {{ user_home }}/.local/share/kwin/scripts/kzones
    rm -rf /tmp/kzones_tmp
  become: yes
  tags: [kde, extensions, kwin]

# --- KZones Configuration ---
- name: KDE Extensions | Read custom KZones layouts
  ansible.builtin.set_fact:
    kzones_layouts_content: "{{ lookup('file', 'kzones_layouts.json') | from_json | to_json(separators=(',', ':')) }}"
  tags: [kde, extensions, kwin, layouts]

- name: KDE Extensions | Apply custom KZones layouts
  ansible.builtin.command:
    cmd: "kwriteconfig6 --file kzonesrc --group General --key Layouts '{{ kzones_layouts_content }}'"
  become_user: "{{ user_name }}"
  when: is_kde and user_name != 'root'
  tags: [kde, extensions, kwin, layouts]
