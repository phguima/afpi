---
# Visual Personalization (KDE Plasma & SDDM)

- name: Personalize | Create backgrounds directory
  ansible.builtin.file:
    path: /usr/share/backgrounds/afpi
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [personalization, wallpaper]

- name: Personalize | Copy wallpaper to system directory
  ansible.builtin.copy:
    src: "{{ system_wallpaper }}"
    dest: "/usr/share/backgrounds/afpi/{{ system_wallpaper }}"
    owner: root
    group: root
    mode: '0644'
  ignore_errors: "{{ ansible_check_mode }}"
  tags: [personalization, wallpaper]

- name: Personalize | Copy profile picture to user home
  ansible.builtin.copy:
    content: "{{ user_profile_picture_base64 | b64decode }}"
    dest: "{{ user_home }}/.face.icon"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0644'
  when: 
    - user_name != 'root'
    - user_profile_picture_base64 is defined
  tags: [personalization, profile]

- name: Personalize | Copy profile picture (fallback from file)
  ansible.builtin.copy:
    src: "{{ user_profile_picture }}"
    dest: "{{ user_home }}/.face.icon"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0644'
  when: 
    - user_name != 'root'
    - user_profile_picture_base64 is not defined
    - user_profile_picture is defined
  tags: [personalization, profile]

# --- Plasma Desktop Wallpaper ---
- name: Personalize | Force Plasma Wallpaper Application
  ansible.builtin.shell: |
    export DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/$(id -u)/bus
    plasma-apply-wallpaperimage /usr/share/backgrounds/afpi/{{ system_wallpaper }}
  become_user: "{{ user_name }}"
  ignore_errors: yes
  when: is_kde and user_name != 'root' and not ansible_check_mode
  tags: [personalization, wallpaper, visual]



# --- User Profile Picture (AccountsService) ---
- name: Personalize | Ensure AccountsService user directory exists
  ansible.builtin.file:
    path: /var/lib/AccountsService/users
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [personalization, profile]

- name: Personalize | Set profile picture in AccountsService
  community.general.ini_file:
    path: "/var/lib/AccountsService/users/{{ user_name }}"
    section: User
    option: Icon
    value: "{{ user_home }}/.face.icon"
    owner: root
    mode: '0644'
  when: user_name != 'root'
  tags: [personalization, profile]
