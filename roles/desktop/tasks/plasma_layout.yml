---
# Tasks para gerenciar o Layout do KDE Plasma

# --- Detecção de Hardware para o Template ---
- name: Plasma Layout | Detect Root Disk UUID
  ansible.builtin.shell: lsblk -no UUID /dev/$(lsblk -no PKNAME $(findmnt -no SOURCE /))
  register: root_disk_uuid
  changed_when: false
  tags: [kde, layout, detection]

- name: Plasma Layout | Set Hardware Facts
  set_fact:
    plasma_disk_uuid: "{{ root_disk_uuid.stdout }}"
    # Tenta detectar a bateria, se não existir usa BAT1 como padrão
    plasma_battery_id: "battery_{{ ansible_devices.keys() | select('search', 'bat') | first | default('BAT1') }}"
    plasma_gpu_id: "gpu{{ '1' if is_nvidia else '0' }}"
  tags: [kde, layout, detection]

# --- Aplicação do Layout ---
- name: Plasma Layout | Ensure plasma configuration directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.config"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0755'
  when: user_name != 'root'
  tags: [kde, layout]

- name: Plasma Layout | Apply Plasma Applets Configuration (Template)
  ansible.builtin.template:
    src: plasma-appletsrc.j2
    dest: "{{ user_home }}/.config/plasma-org.kde.plasma.desktop-appletsrc"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: '0644'
    backup: yes
  when: is_kde and user_name != 'root'
  notify: Restart Plasmashell
  tags: [kde, layout]

# --- Garantir que Plasmashell reinicie se necessário ---
# Note: Reiniciar o shell via Ansible pode fechar a sessão se não for feito com cuidado.
# O handler 'Restart Plasmashell' deve ser definido no site.yml ou na role.
