---
# NVIDIA proprietary driver installation (signed)

- name: NVIDIA | Check if NVIDIA GPU is present
  set_fact:
    is_nvidia_present: "{{ is_nvidia | default(false) }}"

- name: NVIDIA | Check if NVIDIA drivers are already installed
  ansible.builtin.command: nvidia-smi
  register: nvidia_installed_check
  failed_when: false
  changed_when: false

- name: NVIDIA | Driver Installation Block
  block:
    - name: NVIDIA | Detect Secure Boot status
      ansible.builtin.command: mokutil --sb-state
      register: sb_state
      changed_when: false
      failed_when: false

    - name: NVIDIA | Set Secure Boot fact
      set_fact:
        is_secure_boot: "{{ 'enabled' in sb_state.stdout | lower }}"

    - name: NVIDIA | Ensure RPM Fusion Non-Free is enabled
      ansible.builtin.dnf:
        name: 
          - "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm"
        state: present
        disable_gpg_check: yes

    - name: NVIDIA | Install prerequisites
      ansible.builtin.dnf:
        name: [akmods, kmodtool, openssl, mokutil]
        state: present

    - name: NVIDIA | Ensure MOK directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0750'
        owner: root
        group: root
      loop:
        - /etc/pki/akmods
        - /etc/pki/akmods/certs
        - /etc/pki/akmods/private

    - name: NVIDIA | Check if MOK key exists
      ansible.builtin.stat:
        path: /etc/pki/akmods/certs/public_key.der
      register: mok_key_file

    - name: NVIDIA | Generate MOK key (kmodgenca)
      ansible.builtin.shell: kmodgenca -a
      register: kmodgenca_result
      when: not mok_key_file.stat.exists
      failed_when: false

    - name: NVIDIA | Debug Genca Output
      ansible.builtin.debug:
        var: kmodgenca_result
      when: kmodgenca_result.changed

    - name: NVIDIA | Verify key generation after command
      ansible.builtin.stat:
        path: /etc/pki/akmods/certs/public_key.der
      register: mok_key_file_after

    - name: NVIDIA | List MOK directory content for debug
      ansible.builtin.shell: ls -R /etc/pki/akmods
      register: mok_dir_ls
      changed_when: false

    - name: NVIDIA | Debug Enrollment Pre-requisites
      ansible.builtin.debug:
        msg: 
          - "Secure Boot: {{ sb_state.stdout | trim }}"
          - "Key exists: {{ mok_key_file_after.stat.exists }}"
          - "Directory Structure: {{ mok_dir_ls.stdout }}"

    - name: NVIDIA | Check if MOK key is already in kernel
      ansible.builtin.command: mokutil --test-key /etc/pki/akmods/certs/public_key.der
      register: mok_test
      failed_when: false
      changed_when: false
      when: mok_key_file_after.stat.exists

    - name: NVIDIA | Check if MOK enrollment is already pending
      ansible.builtin.shell: |
        MOK_FINGERPRINT=$(openssl x509 -in /etc/pki/akmods/certs/public_key.der -inform DER -noout -fingerprint -sha1 | cut -d= -f2 | tr -d ':')
        mokutil --list-new | tr -d ':' | grep -qi "$MOK_FINGERPRINT"
      register: mok_pending
      failed_when: false
      changed_when: false
      when: is_secure_boot and mok_key_file_after.stat.exists

    - name: NVIDIA | Set MOK Timeout
      ansible.builtin.shell: mokutil --set-timeout 10
      when: is_secure_boot
      failed_when: false
      changed_when: false

    - name: NVIDIA | Import MOK key (Secure Boot)
      ansible.builtin.shell: |
        (echo '{{ mok_password | default("fedora-afpi") }}'; sleep 1; echo '{{ mok_password | default("fedora-afpi") }}') | mokutil --import /etc/pki/akmods/certs/public_key.der
      register: import_result
      when: 
        - is_secure_boot
        - mok_key_file_after.stat.exists
        - mok_test.rc != 0
        - mok_pending.rc != 0
      no_log: true

    - name: NVIDIA | Confirm MOK Scheduling
      ansible.builtin.debug:
        msg: "MOK import command executed successfully. THE MOK SCREEN WILL APPEAR ON THE NEXT REBOOT."
      when: import_result is changed and import_result.rc == 0

    - name: NVIDIA | Install NVIDIA drivers and related packages
      ansible.builtin.dnf:
        name:
          - akmod-nvidia
          - gcc
          - kernel-devel
          - kernel-headers
          - xorg-x11-drv-nvidia
          - xorg-x11-drv-nvidia-cuda
          - xorg-x11-drv-nvidia-libs
          - xorg-x11-drv-nvidia-libs.i686
          - vulkan
          - xorg-x11-drv-nvidia-cuda-libs
        state: present

    - name: NVIDIA | Wait for kernel modules (akmods) to build
      ansible.builtin.shell: |
        while pgrep -x "akmods" > /dev/null || pgrep -x "rpmbuild" > /dev/null; do
          sleep 5
        done
      async: 1200
      poll: 10
      changed_when: false

    - name: NVIDIA | Force akmods to rebuild and sign modules
      ansible.builtin.shell: |
        akmods --force --kernel $(uname -r) --akmod nvidia
      register: akmods_force_result
      changed_when: true
      failed_when: false

    - name: NVIDIA | Update initramfs (dracut)
      ansible.builtin.shell: dracut --force
      when: akmods_force_result.rc == 0
      changed_when: true

    - name: NVIDIA | Verify module signature again
      ansible.builtin.shell: modinfo -F signer nvidia || echo "NOT_SIGNED"
      register: final_sign_check
      changed_when: false

    - name: NVIDIA | Recommend Reboot
      ansible.builtin.debug:
        msg: 
          - "==========================================================="
          - "NVIDIA status: {{ final_sign_check.stdout }}"
          - "A system REBOOT is REQUIRED to enroll the MOK key if not done yet."
          - "If signer is NOT 'argus' (or your hostname), check /var/cache/akmods/nvidia/"
          - "==========================================================="

  when: 
    - is_nvidia_present
    - nvidia_installed_check.rc != 0
