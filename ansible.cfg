[defaults]
inventory = inventory.ini
# Aumenta o tempo de espera para tarefas demoradas
timeout = 30
# Evita problemas com a troca de arquivos temporários
remote_tmp = /tmp/.ansible-${USER}/tmp

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = True

[ssh_connection]
# O Pipelining reduz o número de operações SSH e acelera a execução
# mesmo em conexões locais, ajudando a manter a sessão ativa.
pipelining = True
