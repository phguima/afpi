---
# Master Playbook for AFPI (Ansible Fedora Post-Install)

- name: AFPI | Fedora Post-Install Setup
  hosts: localhost
  become: yes

  pre_tasks:
    - name: AFPI | Environment Setup
      ansible.builtin.import_tasks: tasks/env_setup.yml
      tags: [always]

  roles:
    - { role: common, tags: [common, system] }
    - { role: hardware, tags: [hardware, drivers] }
    - { role: desktop, tags: [desktop, UI] }
    - { role: apps, tags: [apps, software] }
    - { role: ai_tools, tags: [ai, gemini] }

  post_tasks:
    - name: AFPI | Final Status
      ansible.builtin.debug:
        msg: 
          - "==========================================================="
          - "  AFPI DEPLOYMENT COMPLETED SUCCESSFULLY!                  "
          - "  Your Fedora workstation is now optimized and ready.      "
          - "==========================================================="
      tags: [always]

  handlers:
    - name: Regenerate GRUB
      ansible.builtin.command: grub2-mkconfig -o /etc/grub2-efi.cfg

